name: Evergreen Generate

# Generates one draft evergreen post for French Roofing across all 4 platforms
# (Instagram, Facebook, LinkedIn, Google My Business) via scripts/evergreen-generate.ts
# and opens a PR for human review. Triggered weekly by cron, or on-demand via workflow_dispatch.
#
# Required GitHub Actions secrets:
#   ANTHROPIC_API_KEY  (Anthropic API key with Claude API access)

on:
  schedule:
    # Every Sunday at 14:00 UTC (7am PT during PDT, 6am during PST).
    # Bryan reviews Mon morning, post scheduled for Tue 10am PT by default.
    - cron: "0 14 * * 0"
  workflow_dispatch:
    inputs:
      pillar:
        description: "Pillar slug to generate for"
        required: true
        default: "crew-community"
        type: choice
        options:
          - crew-community
          - personal-brand
          - educational
      photo:
        description: "Photo filename (optional, leave blank for auto-pick)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve pillar
        id: pillar
        run: |
          # Schedule trigger has no inputs. Default to crew-community.
          # Manual dispatch passes inputs.
          if [ -n "${{ github.event.inputs.pillar }}" ]; then
            echo "pillar=${{ github.event.inputs.pillar }}" >> "$GITHUB_OUTPUT"
          else
            echo "pillar=crew-community" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate post
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          PHOTO_ARG=""
          if [ -n "${{ github.event.inputs.photo }}" ]; then
            PHOTO_ARG="--photo=${{ github.event.inputs.photo }}"
          fi
          npx tsx scripts/evergreen-generate.ts \
            --pillar=${{ steps.pillar.outputs.pillar }} \
            $PHOTO_ARG

      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "social: auto-generate evergreen ${{ steps.pillar.outputs.pillar }} post"
          branch: auto/evergreen-${{ github.run_number }}
          delete-branch: true
          title: "auto: evergreen ${{ steps.pillar.outputs.pillar }} post"
          body: |
            Auto-generated draft post for the **${{ steps.pillar.outputs.pillar }}** pillar.

            One photo, four platform variants: Instagram, Facebook, LinkedIn, GMB. Each platform's caption is in its own `caption-<platform>.md` file. `caption.md` mirrors the Instagram caption for backwards compatibility.

            ## Review checklist (per-platform)

            - [ ] **Instagram** (`caption-instagram.md`) — voice matches pillar's POST-EXEMPLAR, social CTA verbatim wrapped in dashes, no hashtags
            - [ ] **Facebook** (`caption-facebook.md`) — direct URL CTA (frenchroofing.com or phone), no dashes block, hashtags optional max 2-3
            - [ ] **LinkedIn** (`caption-linkedin.md`) — 100-180 words, business-owner register, proof points where natural, action CTA + URL
            - [ ] **GMB** (`caption-gmb.md`) — 100-250 words, front-loaded with city + service, phone-forward CTA

            ## Brand-bible checks (apply to all 4)

            - [ ] No em dashes anywhere (`—` is banned by BRAND.md §4)
            - [ ] No banned words (premier, industry-leading, world-class, etc.)
            - [ ] Tagline "Got You Covered!" appears in 0 or 1 of the 4 captions, not multiple
            - [ ] Voice person matches the pillar's rule across all 4 platforms

            ## Visual + scheduling

            - [ ] Confirm photo is correctly oriented (Satori ignores EXIF, run `scripts/normalize-photos.sh` if needed)
            - [ ] Render `og.png`: `npm run dev` then hit `/api/og?photo=...&gradientColor=grey`
            - [ ] Save `og.png` into the post folder (used for all 4 platforms in v1)
            - [ ] Flip per-platform `status: draft` to `status: approved` in `schedule.json` for each platform you're shipping
            - [ ] Update the pillar's `pillar.md` run log
            - [ ] Update `pillars.md` last-run timestamp + post count

            After approval, manually upload to Metricool (or your scheduler). Per-platform Metricool API integration is on the v1 build list (`KEWL.md`).

            Generated by `.github/workflows/evergreen-instagram.yml` on run ${{ github.run_number }}.
          labels: |
            social
            evergreen
            auto-generated
